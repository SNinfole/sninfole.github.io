<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description | strip_newlines | truncate: 160 }}">

  <!-- Set theme before paint to avoid a flash of the wrong palette -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.name }}</a>
      <nav class="site-nav" aria-label="Sections">
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#working-papers">Working Papers</a>
        <a href="#teaching">Teaching</a>
        <a href="#cv">CV</a>
        <a href="#contacts">Contacts</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <section class="hero" id="about">
    <div class="wrap hero-inner">
      <div class="hero-photo">
        <img src="{{ '/assets/img/profile.jpg' | relative_url }}" alt="Portrait of {{ site.name }}">
      </div>
      <div class="hero-text">
        <p class="hero-eyebrow">{{ site.tagline }}</p>
        <h1 class="hero-name">{{ site.name }}</h1>
        <div class="hero-bio">
          {{ site.description | markdownify }}
        </div>
        <div class="hero-actions">
          <a class="btn btn-primary" href="{{ '/CV_Stefano_Ninfole.pdf' | relative_url }}" target="_blank" download>Download CV</a>
          <a class="btn btn-ghost" href="mailto:{{ site.email }}">Email me</a>
        </div>
      </div>
    </div>
  </section>

  <main id="main" class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>© {{ site.time | date: '%Y' }} {{ site.name }} · PhD researcher in Economics, NMBU</p>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
