<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}

  <!-- Set theme before paint to avoid a flash of the wrong palette -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.name }}</a>
      <nav class="site-nav" aria-label="Sections">
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="{{ '/' | relative_url }}#research-impact">Research Impact</a>
        <a href="{{ '/' | relative_url }}#publications">Publications</a>
        <a href="{{ '/' | relative_url }}#working-papers">Working Papers</a>
        <a href="{{ '/map/' | relative_url }}">Map</a>
        <a href="{{ '/' | relative_url }}#teaching">Teaching</a>
        <a href="{{ '/' | relative_url }}#cv">CV</a>
        <a href="{{ '/' | relative_url }}#contacts">Contacts</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <main id="main" class="wrap page-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <p class="footer-name">{{ site.name }}</p>
      <p class="footer-role">PhD researcher in Economics · NMBU · UiA</p>
      <p class="footer-copy">© {{ site.time | date: '%Y' }} {{ site.name }}</p>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) {}
        });
      }
    })();
  </script>
</body>
</html>
